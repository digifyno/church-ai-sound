<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church AI Sound — X18</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<script src="/static/socket.io.min.js"></script>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎚</div>
    <div><div class="logo-name">Church AI Sound</div><div class="logo-sub">X-AIR X18</div></div>
  </div>
  <div class="hdr-r">
    <span class="badge b-sim">SIMULATION</span>
    <span class="badge b-conn off" id="conn">OFFLINE</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<div id="alert"></div>

<div class="scene-bar">
  <div><span class="scene-l">SCENE:</span><span id="scene">—</span></div>
  <div class="health">
    <span style="color:var(--muted)">HEALTH</span>
    <div class="h-bg"><div class="h-bar green" id="h-bar"></div></div>
    <span id="h-lbl">—</span>
  </div>
</div>

<main>
  <div class="left">
    <div class="stitle">Live Channel Meters</div>
    <div id="chs"></div>
  </div>
  <div class="side">

    <div class="sim">
      <div class="sim-hdr">
        <div class="sim-title">AI Would Adjust</div>
        <div class="sim-note">not applied</div>
      </div>
      <div id="sim"></div>
    </div>

    <div class="ai">
      <div class="ai-h"><div class="ai-dot"></div><div class="ai-lbl">AI TECHNICIAN</div></div>
      <div id="ai-text">Connecting...</div>
      <div class="ai-ts" id="ai-ts"></div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap">
        <span style="font-size:9px;color:var(--muted)">Requests: <span id="ai-req" style="color:var(--text)">0</span></span>
        <span style="font-size:9px;color:var(--muted)">Tokens: <span id="ai-tok" style="color:var(--text)">0</span></span>
        <span style="font-size:9px;color:var(--muted)">Cost: <span id="ai-cost" style="color:var(--yellow)">$0.000</span></span>
      </div>
    </div>

    <div class="card">
      <div class="stitle">Room Microphone</div>
      <div class="room-db ok" id="r-db">— dB</div>
      <div class="r-bar-bg"><div class="r-bar green" id="r-bar"></div></div>
      <span class="sp off" id="sp">SPEECH</span>
      <div class="freqs" id="freqs"></div>
    </div>

    <div class="card">
      <div class="stitle">Mix Summary</div>
      <div class="st"><span class="stk">Active channels</span><span class="stv" id="sa">—</span></div>
      <div class="st"><span class="stk">Loudest</span><span class="stv" id="sl">—</span></div>
      <div class="st"><span class="stk">Quietest active</span><span class="stv" id="sq">—</span></div>
      <div class="st"><span class="stk">Level spread</span><span class="stv" id="ss">—</span></div>
    </div>

  </div>
</main>

<script src="/static/app.js"></script>
</body>
</html>
